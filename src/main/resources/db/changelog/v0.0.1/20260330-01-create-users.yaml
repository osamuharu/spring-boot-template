databaseChangeLog:
  - changeSet:
      id: 20260330-01-create-users
      author: osamuharu
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                    name: first_name
                    type: VARCHAR(50)
                    constraints:
                        nullable: false
              - column:
                    name: last_name
                    type: VARCHAR(50)
                    constraints:
                        nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                    name: password
                    type: VARCHAR(255)
                    constraints:
                      nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                        nullable: false