spring:
  datasource:
    url: jdbc:mysql://localhost:3306/template?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: yourusername
    password: yourpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: dev
    drop-first: true